<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!--* Tailwind & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>

    <!-- *Login Interface -->
    <section class="w-11/12 mx-auto min-h-screen flex  justify-center items-center ">
        <div class="shadow-sm bg-base-200 p-10">
            <div class="loginFormHeading flex flex-col items-center text-center">
                <img src="assets/github-logo.png" alt="GitHub Logo" class="my-4">
                <h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
                <p class="text-[#64748B]">Sign in to manage your issues</p>
            </div>

            <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
                <label class="text-[16px] text-[#1F2937]">Username</label>
                <input type="email" class="input" placeholder="Enter Username" />

                <label class="text-[16px] text-[#1F2937]">Password</label>
                <input type="password" class="input" placeholder="Enter Password" />

                <button id="loginBtn" class="btn btn-primary mt-4">Sing In</button>
            </fieldset>

            <div class="grid grid-cols-3 justify-between items-center">
                <hr class="text-gray-400">
                <h2 class="text-center">or</h2>
                <hr class="text-gray-400">
            </div>

            <div class="mt-4 text-center text-sm text-gray-500">
                <p class="text-[14px] mb-5">Demo Credential</p>
                <p><span class="font-bold">Username:</span> admin</p>
                <p><span class="font-bold">Password:</span> admin123</p>
            </div>
        </div>
    </section>



    <script src="script/script.js"></script>
</body>

</html>
